<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakpoint Preview - Path Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #ccc;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 16px;
    min-height: 100vh;
  }
  h1 {
    font-size: 14px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }
  .hint {
    font-size: 12px;
    color: #555;
    margin-bottom: 20px;
  }
  .frames {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    overflow-x: auto;
    padding-bottom: 16px;
  }
  .frame-wrap {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .frame-label {
    font-size: 11px;
    font-weight: 700;
    color: #22d3ee;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .frame-label .dim {
    font-weight: 400;
    color: #555;
    font-size: 10px;
  }
  .frame-border {
    border: 1px solid #222;
    border-radius: 6px;
    overflow: hidden;
    background: #111;
  }
  iframe {
    display: block;
    border: none;
    background: #0b0f19;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  button {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 5px;
    color: #aaa;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { border-color: #22d3ee; color: #22d3ee; }
</style>
</head>
<body>

<h1>Responsive Preview: Path Test Sketch</h1>
<div class="hint">Each iframe is sized to a standard breakpoint. Hit Reload All after making changes. Scroll right for larger viewports.</div>

<div class="controls">
  <button onclick="reloadAll()">Reload All</button>
  <button onclick="toggleTheme('dark')">Dark Theme</button>
  <button onclick="toggleTheme('light')">Light Theme</button>
</div>

<div class="frames">
  <!-- xs: Phone portrait -->
  <div class="frame-wrap">
    <div class="frame-label">xs - Phone <span class="dim">375 x 812</span></div>
    <div class="frame-border">
      <iframe id="f-xs" src="path-test-sketch.html" width="375" height="812"></iframe>
    </div>
  </div>

  <!-- sm: Large phone / small tablet -->
  <div class="frame-wrap">
    <div class="frame-label">sm - Large Phone <span class="dim">640 x 900</span></div>
    <div class="frame-border">
      <iframe id="f-sm" src="path-test-sketch.html" width="640" height="900"></iframe>
    </div>
  </div>

  <!-- md: Tablet portrait -->
  <div class="frame-wrap">
    <div class="frame-label">md - Tablet <span class="dim">768 x 1024</span></div>
    <div class="frame-border">
      <iframe id="f-md" src="path-test-sketch.html" width="768" height="1024"></iframe>
    </div>
  </div>

  <!-- lg: Tablet landscape / small laptop -->
  <div class="frame-wrap">
    <div class="frame-label">lg - Small Laptop <span class="dim">1024 x 768</span></div>
    <div class="frame-border">
      <iframe id="f-lg" src="path-test-sketch.html" width="1024" height="768"></iframe>
    </div>
  </div>

  <!-- xl: Desktop -->
  <div class="frame-wrap">
    <div class="frame-label">xl - Desktop <span class="dim">1280 x 800</span></div>
    <div class="frame-border">
      <iframe id="f-xl" src="path-test-sketch.html" width="1280" height="800"></iframe>
    </div>
  </div>
</div>

<script>
function reloadAll() {
  document.querySelectorAll('iframe').forEach(f => {
    f.src = f.src.split('?')[0] + '?t=' + Date.now();
  });
}

function toggleTheme(theme) {
  document.querySelectorAll('iframe').forEach(f => {
    try {
      f.contentDocument.documentElement.setAttribute('data-theme', theme);
    } catch(e) {
      // cross-origin fallback: reload with hash
      f.src = f.src.split('#')[0] + '#theme=' + theme + '&t=' + Date.now();
    }
  });
}
</script>

</body>
</html>
