<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedWave Path Test - Unified Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === SpeedWave Design Tokens === */
:root {
  --bg-primary:     #0b0f19;
  --bg-secondary:   #111827;
  --bg-card:        #151c2c;
  --bg-card-hover:  #1a2236;
  --bg-input:       #1a2236;
  --bg-tooltip:     #1e2740;
  --text-primary:   #e5e7eb;
  --text-secondary: #9ca3af;
  --text-muted:     #6b7280;
  --text-heading:   #f9fafb;
  --border:         #1f2937;
  --border-light:   #1a2236;
  --border-bright:  #374151;
  --accent-cyan:    #22d3ee;
  --accent-cyan-dim: rgba(34, 211, 238, 0.10);
  --accent-magenta: #e879f9;
  --accent-magenta-dim: rgba(232, 121, 249, 0.10);
  --accent-green:   #34d399;
  --accent-green-dim: rgba(52, 211, 153, 0.10);
  --accent-amber:   #f59e0b;
  --accent-amber-dim: rgba(245, 158, 11, 0.10);
  --accent-red:     #ef4444;
  --accent-red-dim: rgba(239, 68, 68, 0.10);
  --accent-blue:    #3b82f6;
  --accent-blue-dim: rgba(59, 130, 246, 0.10);
  --accent-purple:  #a78bfa;
  --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:  'JetBrains Mono', 'SFMono-Regular', Menlo, monospace;
  --gap:        12px;
  --radius:     8px;
  --radius-sm:  5px;
  --transition: 150ms ease;
  --shadow:     0 1px 3px rgba(0,0,0,0.35);
  --shadow-lg:  0 4px 20px rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg-primary:     #f1f3f6;
  --bg-secondary:   #f6f7f9;
  --bg-card:        #ffffff;
  --bg-card-hover:  #f7f8fa;
  --bg-input:       #edf0f4;
  --bg-tooltip:     #1e2740;
  --text-primary:   #1a2332;
  --text-secondary: #475569;
  --text-muted:     #8494a7;
  --text-heading:   #0f1729;
  --border:         #d8dce3;
  --border-light:   #e8ebf0;
  --border-bright:  #c8cdd5;
  --shadow:         0 1px 3px rgba(0,0,0,0.07);
  --shadow-lg:      0 4px 20px rgba(0,0,0,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  line-height: 1.5;
  padding: 24px;
  min-height: 100vh;
}

/* === Page Shell === */
.page-header {
  max-width: 860px;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.page-title {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-heading);
  letter-spacing: 0.5px;
}
.page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.controls { display: flex; gap: 6px; flex-wrap: wrap; }
.ctrl-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 14px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all var(--transition);
}
.ctrl-btn:hover { border-color: var(--border-bright); color: var(--text-heading); }
.ctrl-btn.active { background: var(--accent-cyan-dim); border-color: var(--accent-cyan); color: var(--accent-cyan); }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: background var(--transition), border-color var(--transition);
  max-width: 860px;
  margin: 0 auto;
}
[data-theme="light"] .card { box-shadow: var(--shadow); }
[data-theme="light"] .p-node-icon { border-color: var(--border-bright); background: var(--bg-card); }
[data-theme="light"] .p-node-icon svg { stroke: var(--text-muted); }
[data-theme="light"] .p-node-icon.has-issue svg { stroke: var(--accent-red); }
.card-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ============================================================
   HORIZONTAL PIPELINE (Desktop / Wide)
   ============================================================ */
.path-container { padding: 24px 20px 20px; }

.pipeline {
  display: flex;
  align-items: flex-start;
  gap: 0;
  position: relative;
}
/* Baseline track: thin line connecting all nodes */
.pipeline::before {
  content: '';
  position: absolute;
  top: 22px; /* center of 44px node icon */
  left: 36px; /* half of first node min-width */
  right: 36px;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  z-index: 0;
}

/* --- Node --- */
.p-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  z-index: 2;
  flex-shrink: 0;
  min-width: 72px;
}
.p-node-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--border-bright);
  background: var(--bg-card);
  transition: all 0.25s;
  position: relative;
}
.p-node-icon svg {
  width: 22px;
  height: 22px;
  stroke: var(--text-secondary);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: stroke 0.25s;
}
.p-node-icon.has-issue svg { stroke: var(--accent-red); }
.p-node-icon.has-issue {
  border-color: var(--accent-red);
  box-shadow: 0 0 12px rgba(239, 68, 68, 0.2);
}
.p-node-name {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-secondary);
  text-align: center;
  max-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.p-node-role {
  font-size: 9px;
  color: var(--text-muted);
  margin-top: -3px;
  text-align: center;
}
/* Desktop: hide the mobile-only text block */
.p-node-text-mobile { display: none; }

/* --- Link (the segment between nodes) --- */
.p-link {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 80px;
  position: relative;
  cursor: pointer;
  /* vertically center the bar with the node icons */
  padding-top: 16px;
}

/* Speed label above bar */
.p-link-speed {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-heading);
  margin-bottom: 4px;
  transition: all 0.2s;
  white-space: nowrap;
}
.p-link-speed .unit {
  font-weight: 400;
  font-size: 9px;
  color: var(--text-muted);
  margin-left: 1px;
}

/* The bar: gray track at full width, colored fill inside */
.p-link-bar {
  width: 100%;
  height: 10px;
  border-radius: 5px;
  transition: transform 0.2s;
  position: relative;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}
[data-theme="light"] .p-link-bar { background: rgba(0,0,0,0.06); }
.p-link:hover .p-link-bar-wrap .p-link-bar { transform: scaleY(1.6); }
.p-link-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.6s ease-out;
  position: relative;
}
.p-link-bar-fill.good { background: var(--accent-green); box-shadow: 0 0 10px rgba(52,211,153,0.25); }
.p-link-bar-fill.moderate { background: var(--accent-amber); box-shadow: 0 0 10px rgba(245,158,11,0.25); }
.p-link-bar-fill.poor {
  background: var(--accent-red);
  box-shadow: 0 0 10px rgba(239,68,68,0.25);
  animation: barPulse 2s ease-in-out infinite;
}
@keyframes barPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}

/* Bar wrapper: positions the notification dot relative to the track */
.p-link-bar-wrap {
  position: relative;
  width: 100%;
}
/* Worst-link notification dot */
/* Notification dot: positioned on .p-link-bar-wrap, top-right of the gray pipe */
.p-link-notif {
  display: none;
  position: absolute;
  top: -9px;
  right: -7px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent-red);
  border: 2.5px solid var(--bg-card);
  z-index: 5;
  animation: notifPulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  pointer-events: none;
}
.p-link-notif::after {
  content: '!';
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 900;
  color: #fff;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  line-height: 1;
}
.p-link.worst-link .p-link-notif { display: block; }
/* The pulse: scale + outward ring shadow in sync */
@keyframes notifPulse {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5);
  }
  40% {
    transform: scale(1.15);
    box-shadow: 0 0 0 8px rgba(239, 68, 68, 0);
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
  }
}

/* Label below bar */
.p-link-label {
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 4px;
  white-space: nowrap;
  text-align: center;
}

/* Arrow indicator at end of fill */
.p-link-bar-fill::after {
  content: '';
  position: absolute;
  right: -3px;
  top: 50%;
  transform: translateY(-50%);
  width: 0;
  height: 0;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
}
.p-link-bar-fill.good::after { border-left: 5px solid var(--accent-green); }
.p-link-bar-fill.moderate::after { border-left: 5px solid var(--accent-amber); }
.p-link-bar-fill.poor::after { border-left: 5px solid var(--accent-red); }

/* === Inline Detail Panel (expands below clicked link) === */
.p-detail-row {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, margin 0.35s ease, opacity 0.25s ease;
  opacity: 0;
  margin-top: 0;
}
.p-detail-row.open {
  max-height: 300px;
  opacity: 1;
  margin-top: 16px;
}
.p-detail {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border-light);
  background: var(--bg-input);
  position: relative;
}
/* Upward-pointing triangle connecting detail to pipeline */
.p-detail::before {
  content: '';
  position: absolute;
  top: -7px;
  left: var(--arrow-left, 50%);
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-bottom: 7px solid var(--border-light);
}
.p-detail::after {
  content: '';
  position: absolute;
  top: -6px;
  left: var(--arrow-left, 50%);
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 6px solid var(--bg-input);
}
.p-detail-speeds {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  min-width: 110px;
}
.p-detail-speed-row {
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.p-detail-dir {
  font-size: 12px;
  width: 14px;
  text-align: center;
}
.p-detail-dir.dl { color: var(--text-muted); }
.p-detail-dir.ul { color: var(--text-muted); }
.p-detail-val {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-heading);
}
.p-detail-unit {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* Capacity mini-bar in detail */
.p-detail-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.p-detail-bar {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}
[data-theme="light"] .p-detail-bar { background: rgba(0,0,0,0.06); }
.p-detail-bar-fill {
  height: 100%;
  border-radius: 3px;
}
.p-detail-bar-fill.good { background: var(--accent-green); }
.p-detail-bar-fill.moderate { background: var(--accent-amber); }
.p-detail-bar-fill.poor { background: var(--accent-red); }
.p-detail-pct {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  flex-shrink: 0;
  min-width: 32px;
  text-align: right;
}

/* Recommendation in detail */
.p-detail-rec {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}
.p-detail-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 3px 10px;
  border-radius: 4px;
  width: fit-content;
}
.p-detail-badge.good { color: var(--accent-green); background: var(--accent-green-dim); border: 1px solid rgba(52,211,153,0.25); }
.p-detail-badge.moderate { color: var(--accent-amber); background: var(--accent-amber-dim); border: 1px solid rgba(245,158,11,0.25); }
.p-detail-badge.poor { color: var(--accent-red); background: var(--accent-red-dim); border: 1px solid rgba(239,68,68,0.25); }

.p-detail-rec-text {
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--text-primary);
}
.p-detail-rec-text strong { font-weight: 600; }

/* Close button for detail panel (kept small, tap-outside also closes) */
.p-detail-close {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 22px;
  height: 22px;
  border-radius: 4px;
  border: none;
  background: rgba(255,255,255,0.04);
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.p-detail-close:hover { color: var(--text-heading); background: rgba(255,255,255,0.10); }
[data-theme="light"] .p-detail-close { background: rgba(0,0,0,0.04); }
[data-theme="light"] .p-detail-close:hover { background: rgba(0,0,0,0.08); }

/* === Speed Hero (top of card) === */
.p-hero {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.p-hero-speeds {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}
.p-hero-speed {
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.p-hero-speed-ul .p-hero-val { font-size: 22px; }
.p-hero-dir {
  font-size: 16px;
  font-weight: 600;
  width: 14px;
  text-align: center;
  color: var(--text-muted);
}
.p-hero-val {
  font-family: var(--font-mono);
  font-size: 36px;
  font-weight: 700;
  color: var(--text-heading);
  line-height: 1;
}
.p-hero-unit {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 400;
}
.p-hero-meta {
  flex: 1;
  min-width: 0;
}
.p-hero-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.p-hero-bar {
  height: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}
[data-theme="light"] .p-hero-bar { background: rgba(0,0,0,0.06); }
.p-hero-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s ease-out;
}
.p-hero-of {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}
@media (max-width: 860px) {
  .p-hero { padding: 16px; gap: 14px; }
  .p-hero-val { font-size: 26px; }
  .p-hero-speed-ul .p-hero-val { font-size: 18px; }
  .p-hero-dir { font-size: 14px; }
}

/* === End-to-end summary bar (now inside bottleneck area) === */
.p-summary {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  margin-top: 16px;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
}
.p-summary-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  white-space: nowrap;
}
.p-summary-bar {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}
[data-theme="light"] .p-summary-bar { background: rgba(0,0,0,0.06); }
.p-summary-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s ease-out;
}
.p-summary-value {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-heading);
  white-space: nowrap;
}
.p-summary-value .unit {
  font-size: 10px;
  font-weight: 400;
  color: var(--text-muted);
}

/* === Bottleneck / "What can I do?" expandable section === */
.p-bottleneck {
  margin-top: 12px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  line-height: 1.5;
  overflow: hidden;
}
.p-bottleneck.has-issue {
  background: var(--accent-red-dim);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--text-primary);
}
.p-bottleneck.has-warning {
  background: var(--accent-amber-dim);
  border: 1px solid rgba(245,158,11,0.2);
  color: var(--text-primary);
}
.p-bottleneck.all-good {
  background: var(--accent-green-dim);
  border: 1px solid rgba(52,211,153,0.2);
  color: var(--text-primary);
}

.p-bottleneck-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.p-bottleneck-header:hover { background: rgba(255,255,255,0.03); }
[data-theme="light"] .p-bottleneck-header:hover { background: rgba(0,0,0,0.03); }

.p-bottleneck-icon {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
}
.p-bottleneck-icon svg {
  width: 20px;
  height: 20px;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}

.p-bottleneck-title {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.p-bottleneck-chevron {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  transition: transform 0.25s ease;
}
.p-bottleneck-chevron svg {
  width: 16px;
  height: 16px;
  stroke: var(--text-muted);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}
.p-bottleneck.expanded .p-bottleneck-chevron { transform: rotate(180deg); }

.p-bottleneck-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.35s ease;
  padding: 0 16px;
}
.p-bottleneck.expanded .p-bottleneck-body {
  max-height: 200px;
  padding: 0 16px 14px;
}
.p-bottleneck-text { line-height: 1.6; }
.p-bottleneck-text strong { font-weight: 600; }

/* ============================================================
   VERTICAL PIPELINE (Mobile / Tablet)
   ============================================================ */
@media (max-width: 860px) {
  body { padding: 12px; }
  .page-header { margin-bottom: 12px; }
  .page-title { font-size: 15px; }

  .pipeline {
    flex-direction: column;
    align-items: stretch;
    gap: 0;
  }
  .pipeline::before { display: none; }

  /* Hide desktop labels, show mobile text block */
  .p-node > .p-node-name,
  .p-node > .p-node-role { display: none; }
  .p-node-text-mobile { display: block !important; }

  .p-node {
    flex-direction: row;
    gap: 10px;
    min-width: unset;
    padding: 4px 0;
  }
  .p-node-icon { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; }
  .p-node-icon svg { width: 20px; height: 20px; }
  .p-node-text-mobile .p-node-name { max-width: 200px; text-align: left; font-size: 11px; }
  .p-node-text-mobile .p-node-role { text-align: left; margin-top: 0; }

  .p-link {
    flex-direction: row;
    align-items: center;
    padding: 10px 0 10px 18px;
    min-width: unset;
    gap: 10px;
    position: relative;
  }
  /* Vertical connector line on mobile */
  .p-link::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 0;
    bottom: 0;
    width: 4px;
    border-radius: 2px;
    background: var(--border);
  }
  .p-link.q-good::before { background: var(--accent-green); }
  .p-link.q-moderate::before { background: var(--accent-amber); }
  .p-link.q-poor::before {
    background: var(--accent-red);
    animation: barPulse 2s ease-in-out infinite;
  }

  .p-link-bar-wrap { display: none; }

  .p-link-speed {
    font-size: 14px;
    margin-bottom: 0;
    margin-left: 22px;
  }
  .p-link-label {
    margin-top: 0;
    margin-left: 0;
    flex: 1;
  }

  /* Worst-link dot: on mobile, center on the vertical color strip */
  /* Use margin-top instead of translateY for centering — the pulse animation owns transform */
  .p-link.worst-link .p-link-bar-wrap { display: block; position: static; }
  .p-link.worst-link .p-link-bar { display: none; }
  .p-link.worst-link .p-link-notif {
    top: 50%; right: auto;
    left: 11px;
    margin-top: -9px;
  }

  /* Mobile speed + badge inline */
  .p-link-mobile-badge {
    display: inline-flex;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 2px 7px;
    border-radius: 3px;
    margin-left: 8px;
  }
  .p-link-mobile-badge.good { color: var(--accent-green); background: var(--accent-green-dim); }
  .p-link-mobile-badge.moderate { color: var(--accent-amber); background: var(--accent-amber-dim); }
  .p-link-mobile-badge.poor { color: var(--accent-red); background: var(--accent-red-dim); }

  /* Detail panel stacks vertically on mobile */
  .p-detail {
    flex-direction: column;
    gap: 12px;
    margin-left: 12px;
  }
  /* Arrow points left on mobile */
  .p-detail::before {
    top: 14px;
    left: -7px;
    transform: none;
    border-left: none;
    border-right: 7px solid var(--border-light);
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
  }
  .p-detail::after {
    top: 15px;
    left: -6px;
    transform: none;
    border-left: none;
    border-right: 6px solid var(--bg-input);
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
  }
  .p-detail-speeds {
    flex-direction: row;
    gap: 20px;
    min-width: unset;
  }

  .p-summary { flex-wrap: wrap; }
}

/* Hide mobile badge and mobile text on desktop */
@media (min-width: 861px) {
  .p-link-mobile-badge { display: none; }
}

/* XL: wider pipeline, bigger nodes */
@media (min-width: 1400px) {
  .card { max-width: 1100px; }
  .page-header { max-width: 1100px; }
  .p-node { min-width: 90px; }
  .p-node-icon { width: 52px; height: 52px; }
  .p-node-icon svg { width: 26px; height: 26px; }
  .p-node-name { font-size: 12px; max-width: 110px; }
  .p-node-role { font-size: 10px; }
  .p-link-speed { font-size: 15px; }
  .p-link-label { font-size: 10px; }
  .p-link-bar { height: 12px; border-radius: 6px; }
  .p-link-bar-fill { border-radius: 6px; }
  .p-link { min-width: 100px; }
  .pipeline::before { top: 26px; left: 45px; right: 45px; }
  .p-detail { max-width: 560px; margin: 0 auto; }
}
</style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="page-title">Network Path</div>
    <div class="page-subtitle">Tap any link to see details and tips</div>
  </div>
  <div class="controls">
    <button class="ctrl-btn active" onclick="setScenario('problem',this)">Problem Network</button>
    <button class="ctrl-btn" onclick="setScenario('good',this)">Healthy Network</button>
    <button class="ctrl-btn" onclick="setScenario('oldclient',this)">Old Device</button>
    <button class="ctrl-btn" onclick="toggleTheme()">Theme</button>
  </div>
</div>

<div class="card">
  <div class="card-label">
    <span>Your Network Path</span>
    <span style="font-weight:400;letter-spacing:0;text-transform:none;font-size:10px;color:var(--text-muted)">Click a link for details</span>
  </div>
  <div class="path-container" id="path-root"></div>
</div>

<script>
// === SVG ICON MAP (line icons, stroke-based, no fill) ===
const ICONS = {
  laptop: `<svg viewBox="0 0 24 24"><path d="M3.5 14V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2v9"/><path d="M1.5 17.5a1 1 0 0 1 1-1h19a1 1 0 0 1 1 1v0a1.5 1.5 0 0 1-1.5 1.5h-18A1.5 1.5 0 0 1 1.5 17.5z"/></svg>`,
  phone: `<svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2.5"/><line x1="10" y1="18" x2="14" y2="18"/></svg>`,
  satellite: `<svg viewBox="0 0 24 24"><circle cx="12" cy="20" r="1.5" fill="currentColor" stroke="none"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M5.5 13.5a9 9 0 0 1 13 0"/><path d="M2.5 10.5a13 13 0 0 1 19 0"/></svg>`,
  router: `<svg viewBox="0 0 24 24"><rect x="2" y="12" width="20" height="7" rx="1.5"/><circle cx="6" cy="15.5" r="1" fill="currentColor" stroke="none"/><circle cx="10" cy="15.5" r="1" fill="currentColor" stroke="none"/><path d="M8 5v7"/><path d="M16 3v9"/></svg>`,
  globe: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="4.5" ry="10"/><path d="M2 12h20"/></svg>`
};

// Bottleneck status icons (stroke-based)
const STATUS_ICONS = {
  warning: `<svg viewBox="0 0 24 24" stroke="var(--accent-red)"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  ok: `<svg viewBox="0 0 24 24" stroke="var(--accent-green)"><circle cx="12" cy="12" r="10"/><polyline points="16 9 10.5 15 8 12.5"/></svg>`,
  device: `<svg viewBox="0 0 24 24" stroke="var(--accent-amber)"><rect x="7" y="2" width="10" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>`
};

// Map node types to icons
function nodeIcon(type) {
  if (type === 'client-laptop') return ICONS.laptop;
  if (type === 'client-phone') return ICONS.phone;
  if (type === 'sat') return ICONS.satellite;
  if (type === 'hub') return ICONS.router;
  if (type === 'wan') return ICONS.globe;
  return ICONS.laptop;
}

// === SCENARIO DATA ===
const scenarios = {
  problem: {
    name: "Problem Network",
    wan: { dl: 932, ul: 931, service: 1000 },
    nodes: [
      { name: "MacBook Pro", role: "Your Device", type: "client-laptop" },
      { name: "Living Room", role: "Satellite", type: "sat" },
      { name: "Upstairs Office", role: "Satellite", type: "sat" },
      { name: "Main Router", role: "Router", type: "hub" },
      { name: "Internet", role: "ISP", type: "wan" }
    ],
    links: [
      {
        quality: "poor", dl: 85, ul: 62, pct: 9,
        label: "Wi-Fi to satellite",
        badge: "Weak signal",
        rec: "<strong>Weak Wi-Fi signal.</strong> Your MacBook Pro has a poor connection to the Living Room satellite. Try moving closer to the satellite, or make sure there aren't thick walls or large appliances between them."
      },
      {
        quality: "moderate", dl: 420, ul: 380, pct: 45,
        label: "Satellite backhaul",
        badge: "Could be better",
        rec: "<strong>Satellite link is slowing things down.</strong> The wireless connection between your Living Room and Upstairs Office satellites is only running at half capacity. Try moving the Living Room satellite to a spot with a clearer line of sight to the Upstairs Office unit."
      },
      {
        quality: "good", dl: 725, ul: 690, pct: 78,
        label: "Satellite to router",
        badge: "Strong",
        rec: "This link is performing well. No action needed."
      },
      {
        quality: "good", dl: 932, ul: 931, pct: 100,
        label: "Internet connection",
        badge: "Full speed",
        rec: "Your internet service is running at full speed."
      }
    ],
    bottleneck: {
      type: "has-issue",
      icon: "warning",
      title: "Weak Wi-Fi to Living Room",
      text: "Your device can only get about 85 Mbps through this link, even though your internet plan delivers 932 Mbps. Fixing this connection would make the biggest improvement."
    }
  },
  good: {
    name: "Healthy Network",
    wan: { dl: 945, ul: 940, service: 1000 },
    nodes: [
      { name: "iPhone 15", role: "Your Device", type: "client-phone" },
      { name: "Kitchen", role: "Satellite", type: "sat" },
      { name: "Main Router", role: "Router", type: "hub" },
      { name: "Internet", role: "ISP", type: "wan" }
    ],
    links: [
      {
        quality: "good", dl: 620, ul: 580, pct: 66,
        label: "Wi-Fi to satellite",
        badge: "Strong",
        rec: "Good connection to the Kitchen satellite."
      },
      {
        quality: "good", dl: 810, ul: 790, pct: 87,
        label: "Satellite to router",
        badge: "Strong",
        rec: "Strong backhaul link. No issues."
      },
      {
        quality: "good", dl: 945, ul: 940, pct: 100,
        label: "Internet connection",
        badge: "Full speed",
        rec: "Your internet service is running at full speed."
      }
    ],
    bottleneck: {
      type: "all-good",
      icon: "ok",
      title: "All Clear",
      text: "Every link in your network is performing well. Your end-to-end speed is limited only by your Wi-Fi device capability, which is normal."
    }
  },
  oldclient: {
    name: "Old Device",
    wan: { dl: 480, ul: 460, service: 500 },
    nodes: [
      { name: "Galaxy S7", role: "Your Device", type: "client-phone" },
      { name: "Bedroom", role: "Satellite", type: "sat" },
      { name: "Main Router", role: "Router", type: "hub" },
      { name: "Internet", role: "ISP", type: "wan" }
    ],
    links: [
      {
        quality: "poor", dl: 52, ul: 38, pct: 10,
        label: "Wi-Fi to satellite",
        badge: "Old device",
        rec: "<strong>Your device is the bottleneck.</strong> The Galaxy S7 (2016) only supports older, slower Wi-Fi. Even with a strong signal, this device can't go much faster. Upgrading to a newer phone or tablet would make a dramatic difference."
      },
      {
        quality: "good", dl: 750, ul: 720, pct: 94,
        label: "Satellite to router",
        badge: "Strong",
        rec: "Great backhaul performance."
      },
      {
        quality: "moderate", dl: 480, ul: 460, pct: 96,
        label: "Internet connection",
        badge: "Plan speed",
        rec: "Running at your plan speed. Contact your ISP if you'd like a faster plan."
      }
    ],
    bottleneck: {
      type: "has-issue",
      icon: "device",
      title: "Old device is the bottleneck",
      text: "Your Galaxy S7 (2016) uses older Wi-Fi technology that maxes out around 50 Mbps. Your network and internet connection are fast. A newer device would unlock speeds 10x faster."
    }
  }
};

let current = 'problem';
let openDetail = -1; // which link index detail is open, -1 = none
let bottleneckExpanded = true; // auto-expand for problem scenarios on load

function setScenario(key, btn) {
  current = key;
  openDetail = -1;
  // Auto-expand bottleneck when there's an issue, collapse for all-good
  bottleneckExpanded = scenarios[key].bottleneck.type !== 'all-good';
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleTheme() {
  document.documentElement.dataset.theme =
    document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
}

function toggleDetail(idx) {
  openDetail = openDetail === idx ? -1 : idx;
  render();
}

function toggleBottleneck() {
  bottleneckExpanded = !bottleneckExpanded;
  render();
}

function render() {
  const s = scenarios[current];
  const root = document.getElementById('path-root');
  let html = '';

  // === Speed Hero (first thing they see) ===
  const bottleneckDl = Math.min(...s.links.map(l => l.dl));
  const bottleneckUl = Math.min(...s.links.map(l => l.ul));
  const dlPct = Math.round((bottleneckDl / s.wan.service) * 100);
  const ulPct = Math.round((bottleneckUl / s.wan.service) * 100);
  const dlColor = dlPct >= 60 ? 'var(--accent-green)' : dlPct >= 30 ? 'var(--accent-amber)' : 'var(--accent-red)';
  const dlColorRaw = dlPct >= 60 ? '#34d399' : dlPct >= 30 ? '#f59e0b' : '#ef4444';
  const ulColorRaw = ulPct >= 60 ? '#34d399' : ulPct >= 30 ? '#f59e0b' : '#ef4444';

  html += `
    <div class="p-hero">
      <div class="p-hero-speeds">
        <div class="p-hero-speed">
          <span class="p-hero-dir">\u2193</span>
          <span class="p-hero-val" style="color:${dlColorRaw}">${bottleneckDl}</span>
          <span class="p-hero-unit">Mbps</span>
        </div>
        <div class="p-hero-speed p-hero-speed-ul">
          <span class="p-hero-dir">\u2191</span>
          <span class="p-hero-val" style="color:${ulColorRaw}">${bottleneckUl}</span>
          <span class="p-hero-unit">Mbps</span>
        </div>
      </div>
      <div class="p-hero-meta">
        <div class="p-hero-label">Your Speed</div>
        <div class="p-hero-bar">
          <div class="p-hero-bar-fill" style="width:${dlPct}%;background:${dlColor};"></div>
        </div>
        <div class="p-hero-of">${dlPct}% of your ${s.wan.service} Mbps plan</div>
      </div>
    </div>`;

  // === Find worst link index ===
  let worstIdx = -1, worstDl = Infinity;
  s.links.forEach((lk, i) => { if (lk.dl < worstDl) { worstDl = lk.dl; worstIdx = i; } });
  const hasBottleneck = s.links[worstIdx] && s.links[worstIdx].quality !== 'good';


  // === Pipeline row ===
  html += '<div class="path-container"><div class="pipeline">';
  for (let i = 0; i < s.nodes.length; i++) {
    const nd = s.nodes[i];
    const hasIssue = i > 0 && s.links[i-1] && s.links[i-1].quality === 'poor';
    const linkAfter = s.links[i];

    html += `
      <div class="p-node">
        <div class="p-node-icon ${hasIssue ? 'has-issue' : ''}">${nodeIcon(nd.type)}</div>
        <div class="p-node-name">${nd.name}</div>
        <div class="p-node-role">${nd.role}</div>
        <div class="p-node-text-mobile">
          <div class="p-node-name">${nd.name}</div>
          <div class="p-node-role">${nd.role}</div>
        </div>
      </div>`;

    if (linkAfter) {
      const lk = linkAfter;
      const isWorst = hasBottleneck && i === worstIdx;
      html += `
        <div class="p-link q-${lk.quality}${isWorst ? ' worst-link' : ''}" onclick="toggleDetail(${i})">
          <div class="p-link-speed">${lk.dl} <span class="unit">Mbps</span>
            <span class="p-link-mobile-badge ${lk.quality}">${lk.quality === 'good' ? '\u2713' : lk.quality === 'moderate' ? '!' : '\u2717'}</span>
          </div>
          <div class="p-link-bar-wrap"><div class="p-link-bar"><div class="p-link-bar-fill ${lk.quality}" style="width:${Math.max(15, Math.round((lk.dl / s.wan.service) * 100))}%"></div></div><div class="p-link-notif"></div></div>
          <div class="p-link-label">${lk.label}</div>
        </div>`;
    }
  }
  html += '</div>'; // close .pipeline
  for (let i = 0; i < s.links.length; i++) {
    const lk = s.links[i];
    const isOpen = openDetail === i;
    const fillPct = Math.min(lk.pct, 100);
    const fromNode = s.nodes[i].name;
    const toNode = s.nodes[i + 1].name;

    html += `
      <div class="p-detail-row ${isOpen ? 'open' : ''}">
        <div class="p-detail">
          <div class="p-detail-speeds">
            <div>
              <div class="p-detail-speed-row">
                <span class="p-detail-dir dl">\u2193</span>
                <span class="p-detail-val">${lk.dl}</span>
                <span class="p-detail-unit">Mbps</span>
              </div>
            </div>
            <div>
              <div class="p-detail-speed-row">
                <span class="p-detail-dir ul">\u2191</span>
                <span class="p-detail-val">${lk.ul}</span>
                <span class="p-detail-unit">Mbps</span>
              </div>
            </div>
            <div class="p-detail-bar-wrap">
              <div class="p-detail-bar">
                <div class="p-detail-bar-fill ${lk.quality}" style="width:${fillPct}%"></div>
              </div>
              <div class="p-detail-pct">${fillPct}%</div>
            </div>
          </div>
          <div class="p-detail-rec">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span class="p-detail-badge ${lk.quality}">${lk.badge}</span>
              <span style="font-size:10px;color:var(--text-muted)">${fromNode} \u2192 ${toNode}</span>
            </div>
            <div class="p-detail-rec-text">${lk.rec}</div>
          </div>
          <button class="p-detail-close" onclick="event.stopPropagation();toggleDetail(${i})">\u2715</button>
        </div>
      </div>`;
  }

  // === Bottleneck / "What can I do?" expandable section ===
  const bnTitle = s.bottleneck.title || 'What can I do?';
  const chevronSvg = `<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
  html += `
    <div class="p-bottleneck ${s.bottleneck.type}${bottleneckExpanded ? ' expanded' : ''}" onclick="toggleBottleneck()">
      <div class="p-bottleneck-header">
        <span class="p-bottleneck-icon">${STATUS_ICONS[s.bottleneck.icon] || s.bottleneck.icon}</span>
        <span class="p-bottleneck-title">${bnTitle}</span>
        <span class="p-bottleneck-chevron">${chevronSvg}</span>
      </div>
      <div class="p-bottleneck-body">
        <div class="p-bottleneck-text">${s.bottleneck.text}</div>
      </div>
    </div>`;

  html += '</div>'; // close .path-container

  root.innerHTML = html;

  // Position detail-panel arrows to align with the clicked link bar
  requestAnimationFrame(() => {
    const links = root.querySelectorAll('.pipeline .p-link');
    const details = root.querySelectorAll('.p-detail-row .p-detail');
    details.forEach((det, i) => {
      const link = links[i];
      if (!link || !det) return;
      const containerRect = det.parentElement.getBoundingClientRect();
      const detRect = det.getBoundingClientRect();
      const linkRect = link.getBoundingClientRect();
      // Center of the link relative to the detail panel's left edge
      const linkCenter = linkRect.left + linkRect.width / 2;
      const arrowLeft = linkCenter - detRect.left;
      // Clamp between 20px and panel width - 20px
      const clamped = Math.max(20, Math.min(arrowLeft, detRect.width - 20));
      det.style.setProperty('--arrow-left', clamped + 'px');
    });
  });
}

render();

// Close detail panel on tap/click outside
document.addEventListener('click', function(e) {
  if (openDetail === -1) return;
  // If click is inside a link or detail panel, let normal handlers deal with it
  if (e.target.closest('.p-link') || e.target.closest('.p-detail')) return;
  openDetail = -1;
  render();
});
</script>

</body>
</html>
